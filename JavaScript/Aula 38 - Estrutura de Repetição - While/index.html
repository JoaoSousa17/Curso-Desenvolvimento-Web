<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JavaScript</title>
        
        <script>
            var x = 1;

            document.write("Início do ciclo<br>");
            while(x <= 10){
                if (x === 8){
                    break;
                } else if (x === 3){
                    x++;
                    continue;
                }

                document.write(x + "<br>");
                x++;
            }
            document.write("Fim do ciclo<br>");
            
        </script>
        
    </head>
    <body>
           
    </body>
</html>
