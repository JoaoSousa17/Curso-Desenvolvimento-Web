<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JavaScript</title>
        
        <script>
            
            var lista_frutas = ["Banana", "Maçã", "Morango", "Uva"];

            for(var x = 0; x < lista_frutas.length; x++){
                document.write(lista_frutas[x] + "<br>")
            }

            document.write("<hr><br>")

            var y = 1
            var x = 1;

            while (y <= 3){
                while (x <= 10){
                    document.write ( y + " x " + x + " = " + (y * x) + "<br>");
                    x++;
                }
                document.write("<hr><br>");
                y++;
                x=1;
            }
            
            
        </script>
        
    </head>
    <body>
           
    </body>
</html>
