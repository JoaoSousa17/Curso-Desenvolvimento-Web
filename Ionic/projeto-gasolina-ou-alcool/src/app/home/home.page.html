<ion-content [fullscreen]="true" class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col size="12">
        <ion-img src="/assets/logo.png"></ion-img>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <h4>Saiba qual a melhor opção para abastecimento do seu carro!</h4>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <ion-item><ion-input label="Preço Álcool, ex: 1,90" label-placement="stacked" type="number" [(ngModel)] = "precoAlcool"></ion-input></ion-item>
        <ion-item><ion-input label="Preço Gasolina, ex: 2,90" label-placement="stacked" type="number" [(ngModel)] = "precoGasolina"></ion-input></ion-item>

        <ion-button expand="full" (click) ="calcular()"> Calcular </ion-button>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <h5 class="ion-text-center">{{resultado}}</h5>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
