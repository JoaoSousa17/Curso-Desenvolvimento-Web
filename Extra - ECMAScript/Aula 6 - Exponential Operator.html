<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>
        <script>
            let resultado = 3 * 3 * 3 * 3
            console.log(resultado)

            resultado = Math.pow(3, 4)
            console.log(resultado)

            resultado = 3 ** 4
            console.log(resultado)
        </script>
    </body>
</html>
