<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>
        <script>
            let arr = [1, 2, 3, 4, [5, 6, 7, 8]]
            console.log(arr)

            let arr2 = arr.flat()
            console.log(arr2)

            console.log('=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-')

            arr = [1, 2, 3, 4, [5, 6, 7, 8], 10, [11, 12, [13, 14, [15, 16]]]]
            console.log(arr)

            arr2 = arr.flat(3)
            console.log(arr2)

        </script>
    </body>
</html>
