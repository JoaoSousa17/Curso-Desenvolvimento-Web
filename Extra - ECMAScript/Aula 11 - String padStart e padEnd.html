<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>
        <script>
            let codigo = '1000'

            codigo = codigo.padStart(10, '0')
            console.log('PadStart ', codigo)

            let codigo2 = '8888'
            codigo2 = codigo2.padEnd(10, '*')
            console.log('PadEnd ', codigo2)
        </script>
    </body>
</html>
