<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>
        <script>
            let arr = [
                'Joao, José, Maria',
                'Sandra, Paulo',
                'Antonia, Fernanda, Marcos'
            ]
            console.log(arr)

            let nomesMap = arr.map(item => {
                return item.split(',')
            })
            console.log(nomesMap)

            let nomesFlatMap = arr.flatMap(item => {
                return item.split(',')
            })
            console.log(nomesFlatMap)

        </script>
    </body>
</html>
