<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>
        <script>

            class Funcionario{
                departamento = 'RH';
                salario = 5580.55;
                static #primeiroNome = 'João';
                static #ultimoNome = 'Silva';

                static #nomeCompleto(){
                    return`${this.#primeiroNome} ${this.#ultimoNome}`
                }

                static showNome(){
                    return this.#nomeCompleto();
                }
            }

            console.log(Funcionario.showNome())

        </script>
    </body>
</html>
