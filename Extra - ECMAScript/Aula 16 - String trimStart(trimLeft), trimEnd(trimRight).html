<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>

    <body>
        <script>
            let texto = '                    teste'
            console.log('.' + texto)
            console.log(texto.trimStart())

            texto = 'teste                    '
            console.log(texto + '.')
            console.log(texto.trimEnd())

        </script>
    </body>
</html>
