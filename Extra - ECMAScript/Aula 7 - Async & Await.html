<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript</title>
    </head>
    <body>
        <script>
            let processoAssincrono = new Promise((resolve, reject) => {
                setTimeout(() => resolve('Sucesso no processo assíncrono'), 3000)
            })

            async function recuperarDados(){
                await processoAssincrono.then(p => console.log(p))

                console.log('Processamento assíncrono 1')

                await fetch('https://jsonplaceholder.typicode.com/comments').then(r => r.json()).then(d => console.log('Comentários: ', d))
                console.log('Processamento assíncrono 2')

                await fetch('https://jsonplaceholder.typicode.com/posts').then(r => r.json()).then(d => console.log('Posts: ', d))
                console.log('Processamento assíncrono 3')
            }

            recuperarDados()
            console.log('Fim')
        </script>
    </body>
</html>
