<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>jQuery</title>

		<style>
			#divExterna {
                background-color: #ccc;
                height: 80px;
                width: 80px;
            }

            .inputFocado{
                background-color: #ff0000;
            }
		</style>

        <script src="jQuery.js"></script>
		<script>
            $(document).ready(() => {
                // -- Aula Eventos Browser/ Navegador
                $('#onload').html("Página Carregada!")

                $(window).scroll(() => {
                    $('#scroll').html("Scroll Acionado!")
                })

                $(window).resize(() => {
                    $('#resize').html('Página redimensionada!').css('background-color', 'red')
                })

                // -- Aula Eventos Mouse - Parte 1

                $('#div1').scroll((e) => {
                    $(e.target).css('background-color', 'blue')
                })

                $('#btn1').mousedown(() => {
                    $('#div2').css('background-color', 'green')
                })

                $('#btn1').mouseup(() => {
                    $('#div2').css('background-color', 'blue')
                })

                $('#btn2').dblclick(() => {
                    $('#div2').css('background-color', 'yellow')
                })

                $('#div2').mousemove((e) => {
                    console.log(e.offsetX, e.offsetY)
                    $('#resultadoDiv').html('X: ' + e.offsetX + ' / Y: ' + e.offsetY)
                })

                // -- Aula Eventos Mouse - Parte 2

                /*$('#divExterna').mouseover(() => {
                    $('#resultadoDiv1').html("Entrou")
                })*/

                $('#divExterna').mouseenter(() => {
                    $('#resultadoDiv1').html("Entrou")
                })

                /*$('#divExterna').mouseout(() => {
                    $('#resultadoDiv1').html("Saiu")
                })*/

                $('#divExterna').mouseleave(() => {
                    $('#resultadoDiv1').html("Saiu")
                })

                // -- Aula Eventos Teclado

                $('#teclado').keydown(() => {
                    $('#resultadoTecla').html('Tecla pressionada!')
                })

                $('#teclado').keyup((e) => {
                    $('#resultadoTecla').html('Tecla liberada!')

                    if(e.keyCode == 13) $('#resultadoTecla').html('Teclou Enter!')
                })

                // -- Aula Eventos Formulário
                $('#nome').focus((e) => {
                    console.log('Esse elemento HTML - Nome - recebeu o foco!')
                    $(e.target).addClass('inputFocado')
                })

                $('#email').focus((e) => {
                    console.log('Esse elemento HTML - Email - recebeu o foco!')
                    $(e.target).addClass('inputFocado')
                })

                $('#nome').blur((e) => {
                    console.log('Esse elemento HTML - Nome - perdeu o foco!')
                    $(e.target).removeClass('inputFocado')
                })

                $('#email').blur((e) => {
                    console.log('Esse elemento HTML - Email - perdeu o foco!')
                    $(e.target).removeClass('inputFocado')
                })

                $('#opcao').change((e) => {
                    console.log('Opção foi modificada! Valor atual: ' + $(e.target).val())
                })

                $('#form').submit((e) => {
                    e.preventDefault()
                    console.log('Formulário Enviado')
                })
            })
		</script>
	</head>

	<body>
		
		<div id="topo">
			<h1>Eventos</h1>
		</div>

		<div>
			<h3>Browser</h3>
			<span>Onload: </span><span id="onload">?</span><br />
			<span>Scroll: </span><span id="scroll">?</span><br />
			<span>Resize Window: </span><span id="resize">?</span>
            <div id="div1" style="height: 100px; width:100px; border: solid 1px; overflow-y: scroll">
                <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
            </div>
			<hr />

			<h3>Mouse</h3>
			<button type="button" id="btn1">Clique aqui</button>
			<button type="button" id="btn2">Clique aqui 2x</button>
			<div id="div2" style="background-color: red; width: 80px; height: 50px; margin-top: 10px; margin-bottom: 10px"></div>
			<span>Resultado do evento sobre a div</span><span id="resultadoDiv"></span>

            <div id="divExterna">
                <span>Div Externa: </span><span id="resultadoDiv1"></span>
            </div>
			<hr />

			<h3>Teclado</h3>
			<span>Nome:</span>
			<input type="text" id="teclado"/>
			<span id="resultadoTecla">Resultado do evento sobre o input</span>
			<hr />

			<h3>Formulário</h3>
			<form id="form">
				<span>Nome:</span>
				<input type="text" id="nome"/>

				<span>E-mail:</span>
				<input type="text" id="email"/>

				<span>Motivo do contato:</span>
				<select id="opcao">
					<option value="">-- Selecione --</option>
					<option value="duvida">Dúvida</option>
					<option value="sugestao">Sugestão</option>
				</select>
				
				<button type="submit">Enviar</button>
			</form>
		</div>
	</body>
</html>
