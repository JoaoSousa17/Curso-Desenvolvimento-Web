<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>jQuery</title>

		<style>
			.div{
                width: 80px;
                height: 80px;
                border: solid 1px #000;
                background-color: #aaa;
            }

            .div2{
                width: 80px;
                height: 80px;
                border: solid 1px #000;
                background-color: #ccc;
            }
		</style>

        <script src="jQuery.js"></script>
		<script>
            $(document).ready(() => {
                $('button').on('click', () => {
                    $('.div').animate({
                        'width': '160px',
                        'height': '160px',
                        'margin-left': '200px',
                        'margin-top': '200px',
                        'border-radius': '45px'
                    }, 
                    {
                        duration: 3500,
                        start: () => {console.log('Animação Iniciada')},
                        complete: () => {
                            $('.div2').animate({
                                'width': '160px',
                                'height': '160px',
                                'margin-left': '200px',
                                'margin-top': '200px',
                                'border-radius': '45px'
                            }, 2000)
                        }
                    })
                })
            })
		</script>
	</head>

	<body>
		
		<button type="button">Iniciar animação</button>
        <div class="div"></div>
        <div class="div2"></div>
			
	</body>
</html>
