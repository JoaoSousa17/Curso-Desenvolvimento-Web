<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript 6</title>
        <script>

            // Contexto Rest

            function soma(...param){
                let resultado = 0

                console.log(param)

                param.forEach(v => resultado += v)

                return resultado
            }

            let res = soma(3, 8, 5, 7)

            console.log(res)

            document.write(res)

            function multiplicacao (m, ...param){
                let acc = m

                param.forEach (v => acc *= v)

                console.log(param)

                return acc
            }

            console.log(multiplicacao (5, 7, 12, 3, 49))


        </script>
    </head>

    </body>
</html>
