<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ECMAScript 6</title>
        <script>

            class Animal {
                constructor(){
                    this.cor = ""
                    this.tamanho = null
                }

                dormir(){
                    console.log("Dormir")
                }

            }

            class Cachorro extends Animal{
                constructor(){
                    super()
                    this.orelhas = "grandes e caídas"
                }

                correr(){
                    console.log("Correr")
                }

                rosnar(){
                    console.log("Rosnar")
                }
            }

            class Passaro extends Animal{
                constructor(){
                    super()
                    this.bico = "Curto"
                }

                voar(){
                    console.log("Voar")
                }
            }

            class Papagaio extends Passaro{
                constructor(){
                    super()
                    this.sabeFalar = true
                }

                falar(){
                    console.log("Falar")
                }
            }

            let cachorro = new Cachorro()
            let passaro = new Passaro()
            let papagaio = new Papagaio()

            console.log(cachorro)
            console.log(passaro)

            cachorro.dormir()

            papagaio.falar()
            papagaio.dormir()
            papagaio.voar()

        </script>
    </head>
    <body>
        
    </body>
</html>
